<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chat DVKH</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .chat-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #0084ff; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.customer { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        .msg.agent { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 11px; color: #65676b; margin-top: 4px; display: block; }
        .msg.agent .msg-time { color: #e0f2ff; }
        .input-area { padding: 15px 20px; border-top: 1px solid #e4e6eb; display: flex; gap: 10px; background: white; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #ccd0d5; border-radius: 20px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #0084ff; }
        button { background: #0084ff; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">💬 Fanpage Cửa Hàng Demo</div>
    <div class="messages" id="chat-box">
        <div class="msg customer">
            Dạ shop ơi, em đặt mua cái áo từ thứ 2 mà nay cuối tuần rồi vẫn chưa thấy ai gọi giao hàng cả. Shop kiểm tra giúp em với ạ!
            <span class="msg-time">10:45 AM</span>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="agent-input" placeholder="Nhập câu trả lời của bạn hoặc dùng Extension CS Assistant để tạo tự động..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button onclick="sendMsg()">Gửi</button>
    </div>
</div>

<script>
    function sendMsg() {
        const input = document.getElementById('agent-input');
        const text = input.value.trim();
        if (!text) return;

        const box = document.getElementById('chat-box');
        
        const div = document.createElement('div');
        div.className = 'msg agent';
        div.innerHTML = text + '<span class="msg-time">Vừa xong</span>';
        
        box.appendChild(div);
        input.value = '';
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
