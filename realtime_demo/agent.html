<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Workspace Pro - Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../demo_premium/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="brand">
                <div class="logo">
                    <i class="fa-solid fa-headset"></i>
                </div>
                <h2>CS Workspace</h2>
            </div>
            
            <div class="nav-menu">
                <a href="#" class="nav-item active"><i class="fa-regular fa-comment-dots"></i> Đoạn chat</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Khách hàng</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-server"></i> <span id="ws-status" style="color: #ef4444">Disconnected</span></a>
            </div>

            <div class="conversation-list">
                <h3>Gần đây</h3>
                <div id="customer-list">
                    <!-- Customer list will be dynamically added here -->
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area glass">
            <header class="chat-header">
                <div class="current-user">
                    <img src="https://i.pravatar.cc/150?img=1" alt="Avatar">
                    <div>
                        <h3 id="current-customer-name">Chưa chọn khách hàng</h3>
                        <span class="status online">Đang chờ tin nhắn...</span>
                    </div>
                </div>
            </header>

            <div class="messages" id="messages-container">
                <!-- Chat messages here -->
            </div>

            <div class="input-area">
                <button class="icon-btn"><i class="fa-solid fa-paperclip"></i></button>
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                    <button class="btn-ai-assist" id="ai-assist-btn" title="Gợi ý AI"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                </div>
                <button class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <!-- Right Panel (AI Assistant) -->
        <aside class="ai-panel glass">
            <div class="ai-header">
                <div class="ai-icon">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <h3>Trợ lý AI</h3>
            </div>
            
            <div class="ai-body">
                <div class="ai-instruction">
                    <i class="fa-solid fa-lightbulb"></i>
                    <p>Nhấn vào biểu tượng <strong>Cây đũa phép</strong> ở thanh nhập hoặc chờ khách hàng nhắn tin để AI tự động phân tích.</p>
                </div>
                
                <div id="ai-loading" class="ai-loading hidden">
                    <div class="spinner"></div>
                    <p>Đang phân tích ý định khách hàng...</p>
                </div>
                
                <div id="ai-results" class="ai-results hidden">
                    <div class="ai-meta">
                        <div class="meta-item">
                            <span class="label">Chủ đề</span>
                            <span class="value topic" id="ai-topic">-</span>
                        </div>
                        <div class="meta-item">
                            <span class="label">Cảm xúc</span>
                            <span class="value sentiment" id="ai-sentiment">-</span>
                        </div>
                    </div>
                    
                    <h4 class="suggestions-title">Gợi ý trả lời:</h4>
                    <div class="suggestions-list" id="suggestions-list">
                        <!-- Suggestions will be populated here -->
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script src="agent.js"></script>
</body>
</html>
